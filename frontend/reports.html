<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Stock Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Stock Manager</h3>
            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li><a href="products.html"><i class="fas fa-box"></i><span>Products</span></a></li>
            <li><a href="suppliers.html"><i class="fas fa-truck"></i><span>Suppliers</span></a></li>
            <li><a href="stock-in.html"><i class="fas fa-arrow-down"></i><span>Stock In</span></a></li>
            <li><a href="stock-out.html"><i class="fas fa-arrow-up"></i><span>Stock Out</span></a></li>
            <li><a href="reports.html" class="active"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Top Navbar -->
        <div class="top-navbar">
            <h1 class="page-title">Reports</h1>
            <div class="user-dropdown">
                <div class="user-info">
                    <span id="usernameDisplay">Loading...</span>
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Report Type Selection -->
        <div class="row mb-4">
            <div class="col-md-4">
                <select class="form-select" id="reportType" onchange="changeReportType()">
                    <option value="current-stock">Current Stock Report</option>
                    <option value="stock-in">Stock In Report</option>
                    <option value="stock-out">Stock Out Report</option>
                    <option value="supplier-purchases">Supplier Purchase Report</option>
                    <option value="unpaid">Unpaid Purchase Report</option>
                    <option value="low-stock">Low Stock Report</option>
                </select>
            </div>
            <div class="col-md-8" id="filterSection"></div>
        </div>

        <!-- Report Content -->
        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0" id="reportTitle">Current Stock Report</h5>
                <button class="btn btn-success" onclick="exportToExcel()">
                    <i class="fas fa-file-excel me-2"></i>Export to Excel
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover" id="reportTable">
                    <thead id="reportTableHead">
                        <!-- Dynamic headers will be inserted here -->
                    </thead>
                    <tbody id="reportTableBody">
                        <tr>
                            <td colspan="10" class="text-center">
                                <div class="spinner-container">
                                    <div class="spinner"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot id="reportTableFoot">
                        <!-- Dynamic footers will be inserted here -->
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
